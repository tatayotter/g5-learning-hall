name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "android/**"
      - "capacitor.config.ts"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK for release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/LearningHall.apk

      - uses: actions/upload-artifact@v4
        with:
          name: g5-learning-hall-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to a public Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Learning Hall (latest APK)
          body: Auto-built from the latest `main` branch. Download `LearningHall.apk` below and install it on Android.
          make_latest: true
          files: android/app/build/outputs/apk/debug/LearningHall.apk
